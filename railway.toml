# Config-as-code for Railway: dogfood & production deploy from this repo.
# Set secrets in Railway (WALLET_PRIVATE_KEY, GOROVER_SCOUT_KEY, RPC_URL, LLM_*, DRY_RUN).
# Config file path = rover.config.example.ts; nilai real dari env (override) di applyRoverConfig.
# Docs: https://docs.railway.com/config-as-code/reference
#
# PENTING — beda dari monorepo gorover-app:
#   Repo ini TIDAK punya Dockerfile.*. Build = Railpack (bun), bukan Docker.
#   Hapus variabel RAILWAY_DOCKERFILE_PATH / dockerfilePath "Dockerfile.rover" di dashboard
#   (itu hanya untuk service di repo gorover-app). Kalau masih ada, build akan gagal mencari file.

[build]
builder = "RAILPACK"
buildCommand = "bun install --frozen-lockfile && bun run build"

[deploy]
startCommand = "bun run start:agent"
restartPolicyType = "ON_FAILURE"
